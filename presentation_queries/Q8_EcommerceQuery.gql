// eCommerce Analytical Query
// This query simulates a complex SQL analysis on an eCommerce dataset.

MATCH (u:Users), (o:Orders), (p:Products), (c:Categories)
WHERE u.user_id = o.user_id
  AND o.product_id = p.product_id
  AND p.category_id = c.category_id
  AND (u.country = 'India' OR u.country = 'USA' OR u.country = 'Germany')
  AND o.order_date >= '2023-01-01'
  AND o.status = 'DELIVERED'
  AND p.price > 100
  AND (c.category_name = 'Electronics' OR c.category_name = 'Appliances')
RETURN u.user_id, u.name, u.country,
       COUNT(DISTINCT o.order_id) AS total_orders,
       SUM(o.amount) AS total_spent,
       AVG(o.amount) AS avg_order_value,
       MAX(o.amount) AS max_order,
       MIN(o.amount) AS min_order
ORDER BY total_spent DESC, avg_order_value DESC
LIMIT 50;
