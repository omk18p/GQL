// --- Query 1: Simple Match (All Persons) ---
MATCH (p:Person)
RETURN p.name

// --- Query 2: Filtered Match (Older Persons) ---
MATCH (p:Person)
WHERE p.age > 30
RETURN p.name, p.age

// --- Query 3: Match Movies by Genre ---
MATCH (m:Movie)
WHERE m.genre = "Sci-Fi"
RETURN m.title, m.year

// --- Query 4: Join (Actors in Movie_A) ---
MATCH (p:Person)-[r:ACTED_IN]->(m:Movie)
WHERE m.title = "Movie_A"
RETURN p.name, r.role

// --- Query 5: Join (Director and their Movies) ---
MATCH (p:Person)-[r:DIRECTED]->(m:Movie)
RETURN p.name, m.title

// --- Query 6: Social Join (Friends) ---
MATCH (p1:Person)-[r:FRIEND_OF]->(p2:Person)
RETURN p1.name, p2.name, r.since

// --- Query 7: Mega Query (4-Hop Social & Professional Chain) ---
// Find movies acted in by a friend of a friend of Alice
MATCH (p1:Person)-[f1:FRIEND_OF]->(p2:Person)-[f2:FRIEND_OF]->(p3:Person)-[r:ACTED_IN]->(m:Movie)
WHERE p1.name = "Alice"
RETURN p1.name, p2.name, p3.name, m.title
